name: Java CI with Maven

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: CollegeWithAI
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Grant execute permission for mvnw
      working-directory: collegeWithAI
      run: chmod +x mvnw

    - name: Run Tests with Maven
      working-directory: collegeWithAI
      env:
        DB_URL: jdbc:postgresql://localhost:5432/CollegeWithAI
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        IA_API_KEY: mock-api-key-for-testing
      run: ./mvnw test
